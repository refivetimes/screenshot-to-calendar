<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot to Calendar</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Screenshot to Calendar</h1>

    <div id="drop-zone" tabindex="0">
      <input type="file" id="file-input" accept="image/*" hidden>
      <div class="drop-zone-content">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <p>Drop screenshot, click to upload, or paste (⌘V)</p>
      </div>
      <img id="preview" hidden>
    </div>

    <div class="divider"><span>or type a description</span></div>

    <form id="text-form">
      <div class="input-row">
        <input type="text" id="text-input" placeholder='e.g. "Lunch with Sarah tomorrow at noon at Blue Bottle"' autocomplete="off">
        <button type="submit" id="send-btn" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </form>

    <div id="status" class="status" hidden></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
